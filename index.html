<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prapti Anonymous Question Box</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Prapti Agarbathies</h1>
    <h2>Anonymous Question Box</h2>

    <textarea
        id="question"
        placeholder="Type your question here..."
        maxlength="500"
    ></textarea>

    <p id="count">0 / 500</p>

    <button id="submitBtn">
        Submit Question
    </button>

    <p id="message"></p>

</div>

<script src="/js/submit.js"></script>

</body>
</html>
